<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectura | RUIDO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navegacion-principal">
    <a href="index.html" class="logo">RUIDO</a>
    <div class="nav-links">
      <a href="conceptos.html" class="activo">Conceptos</a>
    </div>
  </nav>

  <main class="contenedor-lectura">
    <article id="noticia-principal">
      <h2 style="color: #00ff00; font-family: monospace;">Estableciendo conexión editorial...</h2>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script>
    const contenedor = document.getElementById("noticia-principal");
    const parametros = new URLSearchParams(window.location.search);
    const nombreDelArchivo = parametros.get("archivo");

    if (!nombreDelArchivo) {
      contenedor.innerHTML = "<h2 style='color: red;'>Error: No se ha seleccionado ningún artículo.</h2>";
    } else {
      const rutaDelArchivo = "https://raw.githubusercontent.com/danielaveas/ruido.cl/main/noticias/" + nombreDelArchivo;

      fetch(rutaDelArchivo)
        .then(respuesta => {
          if (!respuesta.ok) {
            throw new Error("El archivo no se encuentra en el servidor.");
          }
          return respuesta.text();
        })
        .then(textoCrudo => {
          let titular = "Artículo sin título";
          let imagenRuta = "";
          let cuerpoMarkdown = textoCrudo;

          // Si el archivo tiene metadatos (Frontmatter) entre '---'
          if (textoCrudo.startsWith('---')) {
            const partes = textoCrudo.split('---');
            if (partes.length >= 3) {
              const metadatos = partes[1];
              cuerpoMarkdown = partes.slice(2).join('---');

              // Procesamos los metadatos línea por línea
              const lineas = metadatos.split('\n');
              lineas.forEach(linea => {
                const par = linea.trim();
                
                // Extraemos el Titular
                if (par.startsWith('title:')) {
                  titular = par.replace(/^title:\s*/, '').replace(/^['"]|['"]$/g, '');
                }
                
                // Extraemos la Imagen
                if (par.startsWith('thumbnail:')) {
                  imagenRuta = par.replace(/^thumbnail:\s*/, '').replace(/^['"]|['"]$/g, '');
                  
                  // Si la ruta viene absoluta de Sveltia (ej: /imagenes/foto.webp)
                  // le quitamos la barra inicial para que lea la carpeta relativa de GitHub Pages
                  if (imagenRuta.startsWith('/')) {
                    imagenRuta = imagenRuta.substring(1);
                  }
                }
              });
            }
          }

          // Traducimos el Markdown del cuerpo a HTML
          const cuerpoHTML = marked.parse(cuerpoMarkdown);

          // Construimos la estructura visual brutalista
          let renderFinal = "";

          // 1. Si hay imagen, la ponemos arriba como banner destacado
          if (imagenRuta) {
            renderFinal += `<img src="${imagenRuta}" class="articulo-imagen" alt="${titular}">`;
          }

          // 2. Colocamos el Titular en gigante
          renderFinal += `<h1 class="articulo-titulo">${titular}</h1>`;

          // 3. Inyectamos el texto de la noticia traducido
          renderFinal += cuerpoHTML;

          // Pintamos todo en pantalla
          contenedor.innerHTML = renderFinal;
        })
        .catch(error => {
          contenedor.innerHTML = `
            <h1 style="color: red; font-size: 2.5rem;">ERROR DE CARGA</h1>
            <p>No pudimos rescatar el artículo de la base de datos.</p>
            <p style="font-family: monospace; color: #666;">Código: ${error.message}</p>
          `;
        });
    }
  </script>
</body>
</html>
